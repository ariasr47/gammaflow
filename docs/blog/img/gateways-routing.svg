<svg viewBox="0 0 980 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Gateways: the route through the pipeline adapts to the goal and current state</title>
  <desc>The orchestrator picks a route from the goal plus current state. A big fuzzy feature runs the full pipeline Discovery, Architect, Product, UX, Split, Build, with an amendment-bounce loop back to the Architect. A clear need starts Product-first with an optional Architect consult. A tiny tweak takes a fast lane straight from Discovery to Build. A gate-check sits between every step.</desc>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
    .h1{fill:#23252B;font-size:23px;font-weight:700}
    .sub{fill:#707684;font-size:13px}
    .rowt{fill:#23252B;font-size:13px;font-weight:700}
    .rows{fill:#8A8170;font-size:10.5px}
    .chip{fill:#1f2937;font-size:11.5px;font-weight:600}
    .leg{fill:#5C6470;font-size:11px}
    .loop{fill:#7A3A1E;font-size:11px;font-weight:600}
    .fast{fill:#1c5650;font-size:11.5px;font-weight:600}
  </style>
  <defs>
    <marker id="g1" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#5C6470"/></marker>
    <marker id="g2" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L7,4 L0,8 z" fill="#B4562B"/></marker>
  </defs>
  <rect x="1" y="1" width="978" height="498" rx="16" fill="#FAF8F4" stroke="#E7E2D8"/>
  <text class="h1" x="34" y="44">It's not a straight line</text>
  <text class="sub" x="34" y="68">The orchestrator picks the route from two things: the goal, and where the work stands today.</text>

  <!-- legend -->
  <polygon points="612,34 621,42 612,50 603,42" fill="#E5E7EF" stroke="#4B5575" stroke-width="1.6"/>
  <text class="leg" x="628" y="46">= gate-check</text>
  <line x1="740" y1="42" x2="772" y2="42" stroke="#8A8170" stroke-width="2" stroke-dasharray="5 3"/>
  <text class="leg" x="778" y="46">= optional step</text>

  <!-- chip helper: rounded rects via repetition -->
  <!-- ROW 1: big & fuzzy -->
  <text class="rowt" x="34" y="132">Big &amp; fuzzy feature</text>
  <text class="rows" x="34" y="148">full pipeline</text>
  <g>
    <rect x="190" y="110" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="233" y="135" text-anchor="middle">Discovery</text>
    <rect x="318" y="110" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="361" y="135" text-anchor="middle">Architect</text>
    <rect x="446" y="110" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="489" y="135" text-anchor="middle">Product</text>
    <rect x="574" y="110" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="617" y="135" text-anchor="middle">UX</text>
    <rect x="702" y="110" width="74" height="40" rx="8" fill="#F3E3D9" stroke="#B4562B" stroke-width="1.6"/><text class="chip" x="739" y="135" text-anchor="middle">Split</text>
    <rect x="800" y="110" width="86" height="40" rx="8" fill="#F3E3D9" stroke="#B4562B" stroke-width="1.6"/><text class="chip" x="843" y="135" text-anchor="middle">Build ∥</text>
  </g>
  <g stroke="#5C6470" stroke-width="1.6">
    <line x1="276" y1="130" x2="316" y2="130" marker-end="url(#g1)"/>
    <line x1="404" y1="130" x2="444" y2="130" marker-end="url(#g1)"/>
    <line x1="532" y1="130" x2="572" y2="130" marker-end="url(#g1)"/>
    <line x1="660" y1="130" x2="700" y2="130" marker-end="url(#g1)"/>
    <line x1="776" y1="130" x2="798" y2="130" marker-end="url(#g1)"/>
  </g>
  <g fill="#E5E7EF" stroke="#4B5575" stroke-width="1.4">
    <polygon points="296,124 302,130 296,136 290,130"/><polygon points="424,124 430,130 424,136 418,130"/>
    <polygon points="552,124 558,130 552,136 546,130"/><polygon points="680,124 686,130 680,136 674,130"/>
  </g>
  <!-- amendment bounce loop UX -> Architect -->
  <path d="M617,110 C617,72 361,72 361,108" fill="none" stroke="#B4562B" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#g2)"/>
  <text class="loop" x="489" y="86" text-anchor="middle">amendment bounce — send it back, don't bulldoze</text>

  <!-- ROW 2: clear need -->
  <text class="rowt" x="34" y="248">Clear need, known tech</text>
  <text class="rows" x="34" y="264">product-first</text>
  <g>
    <rect x="190" y="226" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="233" y="251" text-anchor="middle">Discovery</text>
    <rect x="318" y="226" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="361" y="251" text-anchor="middle">Product</text>
    <rect x="446" y="226" width="86" height="40" rx="8" fill="#FFFFFF" stroke="#8A8170" stroke-width="1.6" stroke-dasharray="5 3"/><text class="chip" x="489" y="248" text-anchor="middle" fill="#6A7286">Architect</text><text x="489" y="260" text-anchor="middle" font-size="8.5" fill="#8A8170" font-family="'Segoe UI',sans-serif">consult</text>
    <rect x="574" y="226" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="617" y="251" text-anchor="middle">UX</text>
    <rect x="702" y="226" width="74" height="40" rx="8" fill="#F3E3D9" stroke="#B4562B" stroke-width="1.6"/><text class="chip" x="739" y="251" text-anchor="middle">Split</text>
    <rect x="800" y="226" width="86" height="40" rx="8" fill="#F3E3D9" stroke="#B4562B" stroke-width="1.6"/><text class="chip" x="843" y="251" text-anchor="middle">Build ∥</text>
  </g>
  <g stroke="#5C6470" stroke-width="1.6">
    <line x1="276" y1="246" x2="316" y2="246" marker-end="url(#g1)"/>
    <line x1="404" y1="246" x2="444" y2="246" marker-end="url(#g1)"/>
    <line x1="532" y1="246" x2="572" y2="246" marker-end="url(#g1)"/>
    <line x1="660" y1="246" x2="700" y2="246" marker-end="url(#g1)"/>
    <line x1="776" y1="246" x2="798" y2="246" marker-end="url(#g1)"/>
  </g>

  <!-- ROW 3: tiny tweak fast lane -->
  <text class="rowt" x="34" y="364">Tiny tweak</text>
  <text class="rows" x="34" y="380">fast lane</text>
  <g>
    <rect x="190" y="342" width="86" height="40" rx="8" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.6"/><text class="chip" x="233" y="367" text-anchor="middle">Discovery</text>
    <rect x="800" y="342" width="86" height="40" rx="8" fill="#F3E3D9" stroke="#B4562B" stroke-width="1.6"/><text class="chip" x="843" y="367" text-anchor="middle">Build</text>
  </g>
  <line x1="276" y1="362" x2="798" y2="362" stroke="#2E6F69" stroke-width="1.8" stroke-dasharray="2 3" marker-end="url(#g1)"/>
  <text class="fast" x="538" y="354" text-anchor="middle">skip the ceremony — straight to build</text>

  <!-- bottom note -->
  <rect x="34" y="416" width="912" height="56" rx="11" fill="#EEF0F6" stroke="#C7CCDC"/>
  <text x="58" y="441" fill="#3a4262" font-size="13" font-weight="700" font-family="'Segoe UI',sans-serif">Gateways decide the path.</text>
  <text x="58" y="460" fill="#4B5575" font-size="12" font-family="'Segoe UI',sans-serif">At each gate the orchestrator checks the handoff is complete, then chooses the next session — advance, branch, fast-track, or bounce back to fix something upstream.</text>
</svg>
