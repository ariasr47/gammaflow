<svg viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>The role relay: how a feature moves through specialist sessions</title>
  <desc>An Architect passes an Architecture Contract to a Product Manager, who passes a Product Contract to a UX/Tech-Writer, who passes a UX Blueprint into a Split step. The Split produces execution contracts and forks into a Backend Builder and a Frontend Builder that build in parallel, both bound to one shared Interface Contract.</desc>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
    .h1{fill:#23252B;font-size:23px;font-weight:700}
    .sub{fill:#707684;font-size:13.5px}
    .ct{fill:#1f2937;font-size:15px;font-weight:600}
    .cs{fill:#5C6470;font-size:11px}
    .lbl{fill:#4A5160;font-size:10.5px;font-weight:600}
    .leg{fill:#5C6470;font-size:11.5px}
    .rt{fill:#7A3A1E;font-size:14px;font-weight:700}
    .note{fill:#8A8170;font-size:12.5px}
  </style>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#2E6F69"/></marker>
    <marker id="arb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#B4562B"/></marker>
  </defs>
  <rect x="1" y="1" width="958" height="538" rx="16" fill="#FAF8F4" stroke="#E7E2D8"/>

  <text class="h1" x="36" y="46">A relay of specialists</text>
  <text class="sub" x="36" y="70">Each session is a fresh expert. It reads the handoff, does one job, and passes a contract on.</text>

  <rect x="700" y="30" width="14" height="14" rx="3" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
  <text class="leg" x="720" y="41">think &amp; design</text>
  <rect x="700" y="52" width="14" height="14" rx="3" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
  <text class="leg" x="720" y="63">build</text>

  <!-- Thinker cards -->
  <g>
    <rect x="36" y="118" width="150" height="60" rx="11" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
    <text class="ct" x="111" y="144" text-anchor="middle">Architect</text>
    <text class="cs" x="111" y="163" text-anchor="middle">shapes the system</text>
  </g>
  <g>
    <rect x="282" y="118" width="150" height="60" rx="11" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
    <text class="ct" x="357" y="144" text-anchor="middle">Product Manager</text>
    <text class="cs" x="357" y="163" text-anchor="middle">scope &amp; stories</text>
  </g>
  <g>
    <rect x="528" y="118" width="150" height="60" rx="11" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
    <text class="ct" x="603" y="144" text-anchor="middle">UX / Tech-Writer</text>
    <text class="cs" x="603" y="163" text-anchor="middle">design &amp; words</text>
  </g>

  <!-- arrows + baton labels between thinkers -->
  <line x1="188" y1="148" x2="280" y2="148" stroke="#2E6F69" stroke-width="2" marker-end="url(#ar)"/>
  <text class="lbl" x="234" y="200" text-anchor="middle">Architecture</text>
  <text class="lbl" x="234" y="212" text-anchor="middle">Contract</text>
  <line x1="434" y1="148" x2="526" y2="148" stroke="#2E6F69" stroke-width="2" marker-end="url(#ar)"/>
  <text class="lbl" x="480" y="200" text-anchor="middle">Product</text>
  <text class="lbl" x="480" y="212" text-anchor="middle">Contract</text>
  <line x1="680" y1="148" x2="716" y2="148" stroke="#2E6F69" stroke-width="2" marker-end="url(#ar)"/>

  <!-- SPLIT node -->
  <polygon points="762,112 812,150 762,188 712,150" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
  <text x="762" y="154" text-anchor="middle" fill="#7A3A1E" font-size="13" font-weight="700" font-family="'Segoe UI',system-ui,sans-serif">SPLIT</text>
  <text class="cs" x="762" y="208" text-anchor="middle">compressor</text>
  <text class="lbl" x="603" y="200" text-anchor="middle">UX Blueprint</text>

  <!-- fork down to builders -->
  <path d="M762,188 C762,250 470,250 420,318" stroke="#B4562B" stroke-width="2" fill="none" marker-end="url(#arb)"/>
  <path d="M762,188 C762,250 690,250 655,318" stroke="#B4562B" stroke-width="2" fill="none" marker-end="url(#arb)"/>
  <rect x="392" y="262" width="120" height="17" rx="4" fill="#FAF8F4"/>
  <text class="lbl" x="452" y="274" text-anchor="middle">Backend Contract</text>
  <rect x="612" y="262" width="124" height="17" rx="4" fill="#FAF8F4"/>
  <text class="lbl" x="674" y="274" text-anchor="middle">Frontend Contract</text>

  <!-- builder cards -->
  <g>
    <rect x="300" y="320" width="190" height="60" rx="11" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
    <text class="ct" x="395" y="346" text-anchor="middle">Backend Builder</text>
    <text class="cs" x="395" y="365" text-anchor="middle">server &amp; data</text>
  </g>
  <g>
    <rect x="560" y="320" width="190" height="60" rx="11" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
    <text class="ct" x="655" y="346" text-anchor="middle">Frontend Builder</text>
    <text class="cs" x="655" y="365" text-anchor="middle">screens &amp; clicks</text>
  </g>

  <!-- shared interface spine -->
  <line x1="395" y1="380" x2="395" y2="436" stroke="#B4562B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="655" y1="380" x2="655" y2="436" stroke="#B4562B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <rect x="300" y="436" width="450" height="40" rx="10" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
  <text class="rt" x="525" y="461" text-anchor="middle">Interface Contract — one shared spec</text>

  <text class="note" x="36" y="466">The two builders work</text>
  <text class="note" x="36" y="483">at the same time —</text>
  <text class="note" x="36" y="500">they never talk,</text>
  <text class="note" x="36" y="517">they only agree on</text>
  <text class="note" x="36" y="534">the spec.</text>

  <text class="note" x="525" y="513" text-anchor="middle" fill="#8A8170">Every station starts fresh: it reads the contracts, not the chat history.</text>
</svg>
