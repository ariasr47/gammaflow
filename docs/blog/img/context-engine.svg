<svg viewBox="0 0 960 470" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How memory works without baggage: one constant ground-truth file, plus a compress step</title>
  <desc>A tall pillar labelled the constant ground truth feeds every session. A fresh session reads a contract and the constant, does messy work full of options and debate, then a compress step keeps the decisions and drops the debate, producing a small dense contract that becomes the next session's handoff. The next session starts fresh again.</desc>
  <style>
    text{font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
    .h1{fill:#23252B;font-size:23px;font-weight:700}
    .sub{fill:#707684;font-size:13.5px}
    .ct{fill:#1f2937;font-size:15px;font-weight:600}
    .cs{fill:#5C6470;font-size:11px}
    .pill-t{fill:#1c4f4a;font-size:15px;font-weight:700}
    .note{fill:#8A8170;font-size:12.5px}
    .loop{fill:#5C6470;font-size:12.5px;font-style:italic}
  </style>
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#2E6F69"/></marker>
    <marker id="arl" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L8,4.5 L0,9 z" fill="#9A8C73"/></marker>
  </defs>
  <rect x="1" y="1" width="958" height="468" rx="16" fill="#FAF8F4" stroke="#E7E2D8"/>

  <text class="h1" x="36" y="46">Memory without baggage</text>
  <text class="sub" x="36" y="70">One stable rulebook everyone shares — plus a squeeze step that keeps the decisions and forgets the noise.</text>

  <!-- Constant pillar -->
  <rect x="28" y="100" width="156" height="250" rx="12" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
  <text class="pill-t" x="106" y="150" text-anchor="middle">The constant</text>
  <text class="pill-t" x="106" y="170" text-anchor="middle">ground truth</text>
  <text class="cs" x="106" y="196" text-anchor="middle">GAMMAFLOW_</text>
  <text class="cs" x="106" y="210" text-anchor="middle">CONTEXT.md</text>
  <line x1="56" y1="228" x2="156" y2="228" stroke="#2E6F69" stroke-width="1" stroke-dasharray="2 2"/>
  <text class="cs" x="106" y="252" text-anchor="middle">read by</text>
  <text class="cs" x="106" y="266" text-anchor="middle">every session</text>

  <!-- dotted feed from pillar -->
  <path d="M184,200 C210,200 210,210 232,210" stroke="#2E6F69" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>
  <path d="M184,250 C420,330 620,300 700,236" stroke="#2E6F69" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>

  <!-- contract in chip -->
  <rect x="236" y="120" width="118" height="30" rx="7" fill="#FFFFFF" stroke="#CFC9BE"/>
  <text class="cs" x="295" y="139" text-anchor="middle" font-weight="600" fill="#4A5160">Contract in</text>
  <line x1="295" y1="150" x2="295" y2="176" stroke="#707684" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- Fresh session -->
  <rect x="234" y="178" width="142" height="92" rx="12" fill="#FFFFFF" stroke="#2E6F69" stroke-width="2"/>
  <circle cx="305" cy="206" r="9" fill="#DCEBE8" stroke="#2E6F69" stroke-width="1.5"/>
  <text x="305" y="211" text-anchor="middle" font-size="12">✦</text>
  <text class="ct" x="305" y="238" text-anchor="middle">Fresh session</text>
  <text class="cs" x="305" y="256" text-anchor="middle">no memory of the chat</text>

  <line x1="376" y1="224" x2="408" y2="224" stroke="#2E6F69" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- messy work blob -->
  <rect x="412" y="178" width="150" height="92" rx="34" fill="#F6F2EA" stroke="#CFC9BE" stroke-width="1.5"/>
  <g fill="#B9B0A0">
    <circle cx="438" cy="204" r="3"/><circle cx="460" cy="214" r="3"/><circle cx="486" cy="200" r="3"/>
    <circle cx="510" cy="216" r="3"/><circle cx="534" cy="206" r="3"/><circle cx="450" cy="232" r="3"/>
    <circle cx="478" cy="240" r="3"/><circle cx="506" cy="234" r="3"/><circle cx="528" cy="244" r="3"/>
    <circle cx="496" cy="222" r="3"/>
  </g>
  <text class="cs" x="487" y="196" text-anchor="middle">the messy middle</text>
  <text class="cs" x="487" y="264" text-anchor="middle">options · debate · dead-ends</text>

  <line x1="562" y1="224" x2="588" y2="224" stroke="#B4562B" stroke-width="2" marker-end="url(#arl)"/>

  <!-- compressor funnel -->
  <polygon points="592,178 690,200 690,248 592,270" fill="#F3E3D9" stroke="#B4562B" stroke-width="2"/>
  <text x="632" y="220" text-anchor="middle" fill="#7A3A1E" font-size="12.5" font-weight="700" font-family="'Segoe UI',system-ui,sans-serif">COMPRESS</text>
  <text x="632" y="236" text-anchor="middle" fill="#9A5638" font-size="9.5" font-family="'Segoe UI',system-ui,sans-serif">keep · drop noise</text>

  <line x1="690" y1="224" x2="712" y2="224" stroke="#B4562B" stroke-width="2" marker-end="url(#arl)"/>

  <!-- contract out -->
  <rect x="716" y="194" width="150" height="60" rx="11" fill="#DCEBE8" stroke="#2E6F69" stroke-width="2"/>
  <text class="ct" x="791" y="220" text-anchor="middle">Contract out</text>
  <text class="cs" x="791" y="238" text-anchor="middle">small · dense · self-contained</text>

  <!-- loop back -->
  <path d="M791,254 C791,360 305,372 305,300 L305,272" stroke="#9A8C73" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arl)"/>
  <text class="loop" x="548" y="392" text-anchor="middle">The next session inherits only this small contract — and starts fresh again.</text>

  <text class="note" x="36" y="392">Nothing is re-explained.</text>
  <text class="note" x="36" y="409">Nothing important is lost.</text>
</svg>
