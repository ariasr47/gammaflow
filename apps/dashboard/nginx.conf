# Convexa dashboard — static SPA server + /api reverse proxy.
# Installed at /etc/nginx/conf.d/default.conf in the runtime stage.
# Runs under nginxinc/nginx-unprivileged (non-root): listens on 8080, and the
# pid/temp paths are already writable-by-non-root in that image.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA client-side routing (react-router BrowserRouter): serve index.html for
    # any path that isn't a real static file, so deep links / refreshes work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy — recreates the Vite dev proxy inside the container.
    # `api` resolves to the backend service via the compose network DNS name.
    # NO_INTERFACE_CHANGE: same-origin /api/* paths, just relocated from Vite.
    location /api {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-safe (GET /api/stream/{ticker} is a long-lived text/event-stream):
        # disable response buffering so events flush immediately, and raise the
        # read timeout well past the 15s heartbeat so nginx never drops the stream.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 1h;
        # The backend already sets X-Accel-Buffering: no on the stream; honored here.
    }
}
